<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>THE LIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080808; --surface: #111111; --accent: #ff2d55; --text: #ffffff; --muted: #555; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--bg); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            color: var(--text); 
            min-height: 100vh; 
        }

        /* Navigace */
        .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8,8,8,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--accent); }
        
        .nav-toggle { font-size: 24px; cursor: pointer; color: white; background: none; border: none; }
        .menu { display: none; position: fixed; top: 60px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; z-index: 1000; flex-direction: column; gap: 10px; }
        .menu.active { display: flex; }
        .menu button { background: none; border: none; color: white; padding: 10px 20px; text-align: left; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 18px; }

        .content { padding: 80px 20px 140px; max-width: 500px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }

        .card { background: rgba(17, 17, 17, 0.85); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; animation: fadeIn 0.5s ease; }
        .gossip-img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
        .person { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .meta { color: var(--muted); font-size: 10px; margin-top: 10px; }

        .rank-item { display: flex; justify-content: space-between; padding: 15px; background: var(--surface); border-radius: 10px; margin-bottom: 5px; border-left: 4px solid var(--accent); }

        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 1px solid var(--border); padding: 15px; z-index: 101; }
        .input-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 8px; }
        input[type="text"] { background: var(--surface); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; }
        .post-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">THE LIST</div>
    <button class="nav-toggle" onclick="document.getElementById('navMenu').classList.toggle('active')">☰</button>
</div>

<div class="menu" id="navMenu">
    <button onclick="showSection('feed')">DRBY (FEED)</button>
    <button onclick="showSection('ranking')">RANKING (TOP)</button>
    <button class="admin-only" onclick="showSection('admin')">ADMIN PANEL</button>
</div>

<div class="content">
    <div id="feed" class="section active">
        <div id="gossipFeed">Načítám...</div>
    </div>

    <div id="ranking" class="section">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:20px;">HALL OF SHAME</h2>
        <div id="rankingList"></div>
    </div>

    <div id="admin" class="section admin-only">
        <h2 style="font-family:'Bebas Neue';">ADMIN NASTAVENÍ</h2>
        <div class="card">
            <p>Změnit pozadí stránky:</p><br>
            <input type="file" id="bgUpload" accept="image/*" onchange="uploadBackground()">
            <button onclick="localStorage.removeItem('customBg'); location.reload();" style="margin-top:10px; color:red; background:none; border:none; cursor:pointer;">Resetovat pozadí</button>
        </div>
        <div id="adminApproveList"></div>
    </div>
</div>

<div class="input-area" id="inputArea">
    <div class="input-container">
        <input type="text" id="personInput" placeholder="Kdo? (jméno/přezdívka)">
        <input type="text" id="gossipInput" placeholder="Co se děje?">
        <div style="display: flex; gap: 10px;">
            <label style="background:var(--surface); padding:10px; border-radius:8px; cursor:pointer; flex:1; text-align:center; border:1px solid var(--border)">
                📷 FOTO <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="this.parentElement.innerText='✅ Foto OK'">
            </label>
            <button class="post-btn" id="postBtn" style="flex:2">POSLAT DRB</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSy...", // DOPLŇ SVOJE API KLÍČE
    authDomain: "the-list-1efde.firebaseapp.com",
    databaseURL: "https://the-list-1efde-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gossipRef = ref(db, 'gossip');

// ADMIN CHECK (BEZ HESLA PRO VEŘEJNOST)
const isAdmin = localStorage.getItem('isAdmin') === 'true';
if(isAdmin) document.body.classList.add('is-admin');

// NAHRÁNÍ POZADÍ
window.uploadBackground = function() {
    const file = document.getElementById('bgUpload').files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        localStorage.setItem('customBg', e.target.result);
        document.body.style.backgroundImage = `url(${e.target.result})`;
    };
    reader.readAsDataURL(file);
}

// NAČTENÍ POZADÍ PŘI STARTU
if(localStorage.getItem('customBg')) {
    document.body.style.backgroundImage = `url(${localStorage.getItem('customBg')})`;
}

// PŘEPÍNÁNÍ SEKCÍ
window.showSection = (id) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navMenu').classList.remove('active');
    document.getElementById('inputArea').style.display = (id === 'feed') ? 'block' : 'none';
};

// POSTOVÁNÍ
document.getElementById('postBtn').onclick = async () => {
    const text = document.getElementById('gossipInput').value;
    const person = document.getElementById('personInput').value.trim().toLowerCase();
    const file = document.getElementById('fileInput').files[0];
    if(!text || !person) return alert("Musíš vyplnit jméno i drb!");

    let base64 = "";
    if (file) {
        base64 = await new Promise(res => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(file);
        });
    }

    await push(gossipRef, {
        text, person, image: base64,
        time: new Date().toLocaleString('cs-CZ'),
        approved: false, likes: 0
    });
    alert("Drb odeslán ke schválení!");
    location.reload();
};

// FUNKCE PRO TLAČÍTKA
window.likePost = (id, cur) => update(ref(db, 'gossip/' + id), { likes: (cur || 0) + 1 });
window.approvePost = (id) => update(ref(db, 'gossip/' + id), { approved: true });
window.deletePost = (id) => confirm("Smazat?") && remove(ref(db, 'gossip/' + id));

// LOGIKA ZOBRAZENÍ
onValue(gossipRef, (snapshot) => {
    const data = snapshot.val() || {};
    const feed = document.getElementById('gossipFeed');
    const rankingDiv = document.getElementById('rankingList');
    const adminDiv = document.getElementById('adminApproveList');
    
    feed.innerHTML = ""; adminDiv.innerHTML = "<h3>Ke schválení:</h3>";
    
    const rankData = {};

    Object.entries(data).reverse().forEach(([id, item]) => {
        // Ranking data (jen schválené)
        if(item.approved) {
            rankData[item.person] = (rankData[item.person] || 0) + (item.likes || 0);
        }

        // Pro admina (neschválené)
        if(isAdmin && !item.approved) {
            adminDiv.innerHTML += `<div class="card">
                <b>@${item.person}</b>: ${item.text}
                <br><button onclick="approvePost('${id}')">✅ Schválit</button>
                <button onclick="deletePost('${id}')">🗑️ Smazat</button>
            </div>`;
        }

        // Feed (jen schválené)
        if(item.approved) {
            feed.innerHTML += `
                <div class="card">
                    <div class="person">@${item.person}</div>
                    <div>${item.text}</div>
                    ${item.image ? `<img src="${item.image}" class="gossip-img">` : ""}
                    <div class="actions">
                        <button class="like-btn" onclick="likePost('${id}', ${item.likes})">❤️ ${item.likes || 0}</button>
                        ${isAdmin ? `<button class="admin-btn" onclick="deletePost('${id}')">🗑️</button>` : ""}
                    </div>
                </div>`;
        }
    });

    // Vykreslení Rankingu
    const sortedRank = Object.entries(rankData).sort((a,b) => b[1] - a[1]);
    rankingDiv.innerHTML = sortedRank.map(([name, likes], i) => `
        <div class="rank-item">
            <span>#${i+1} @${name}</span>
            <span style="color:var(--accent)">${likes} ❤️</span>
        </div>
    `).join('');
});
</script>

</body>
</html>
