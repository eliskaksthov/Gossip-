<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE LIST</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 15px;
}

h1 { text-align: center; }

.nav {
    display: flex;
    justify-content: space-around;
    margin-bottom: 15px;
}

.nav button {
    flex: 1;
    margin: 2px;
    padding: 10px;
    background: #1a1a1a;
    color: white;
    border: none;
}

.card {
    background: #1a1a1a;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
}

input, button.post {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

button.post {
    background: white;
    color: black;
    cursor: pointer;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="container">
    <h1>THE LIST</h1>

    <div class="nav">
        <button onclick="showTab('home')">Home</button>
        <button onclick="showTab('ranking')">Ranking</button>
        <button onclick="showTab('gossip')">Gossip</button>
    </div>

    <!-- HOME -->
    <div id="home">
        <h3>Latest Gossip</h3>
        <div id="latest"></div>
    </div>

    <!-- RANKING -->
    <div id="ranking" class="hidden">
        <h3>Ranking</h3>
        <div id="rankingList"></div>
    </div>

    <!-- GOSSIP -->
    <div id="gossip" class="hidden">
        <h3>All Gossip</h3>
        <div id="feed"></div>

        <input id="input" placeholder="Write gossip... (mention name)">
        <button class="post" onclick="addGossip()">POST</button>
    </div>
</div>

<script>
// default ranking
let people = {
    "Lily": 5,
    "Mason": 4,
    "Chloe": 3,
    "Daniel": 2,
    "Alison": 1
};

// load gossip
let gossip = JSON.parse(localStorage.getItem("gossip")) || [];

// SAVE
function save() {
    localStorage.setItem("gossip", JSON.stringify(gossip));
}

// ADD GOSSIP
function addGossip() {
    const input = document.getElementById("input").value;
    if(input.trim() === "") return;

    gossip.unshift(input);

    // simple ranking logic
    for (let name in people) {
        if (input.toLowerCase().includes(name.toLowerCase())) {
            people[name] += 1;
        }
    }

    save();
    render();
    document.getElementById("input").value = "";
}

// RENDER
function render() {

    // latest
    document.getElementById("latest").innerHTML =
        gossip.length ? `<div class="card">"${gossip[0]}"</div>` : "No gossip yet";

    // feed
    document.getElementById("feed").innerHTML =
        gossip.map(g => `<div class="card">"${g}"</div>`).join("");

    // ranking
    let sorted = Object.entries(people).sort((a,b)=>b[1]-a[1]);

    document.getElementById("rankingList").innerHTML =
        sorted.map((p,i)=>`<div class="card">#${i+1} ${p[0]} (${p[1]})</div>`).join("");
}

// TABS
function showTab(tab) {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("ranking").classList.add("hidden");
    document.getElementById("gossip").classList.add("hidden");

    document.getElementById(tab).classList.remove("hidden");
}

// INIT
render();
</script>

</body>
</html>
