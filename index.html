<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Insider</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #080808; 
            --surface: #111111; 
            --accent: #ff2d55;
            --text: #ffffff; 
            --muted: #555; 
            --border: #222; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--bg);
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            image-rendering: high-quality;
            -webkit-font-smoothing: antialiased;
            color: var(--text); 
            min-height: 100vh; 
        }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
            background: rgba(8,8,8,0.75);
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border); 
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { 
            font-family: 'DM Sans', sans-serif; 
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 0px; 
            color: var(--accent); 
        }
        .nav-toggle { font-size: 28px; cursor: pointer; color: white; background: none; border: none; }
        
        .menu { 
            display: none; position: fixed; top: 60px; right: 20px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px; z-index: 1000; 
            flex-direction: column; gap: 5px; min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .menu.active { display: flex; }
        .menu button { 
            background: none; border: none; color: white; padding: 12px 15px; 
            text-align: left; cursor: pointer; font-family: 'Bebas Neue', sans-serif; 
            font-size: 18px; border-radius: 8px; transition: 0.2s;
        }
        .menu button:hover { background: var(--border); color: var(--accent); }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin #loginBtn { display: none !important; }

        .content { 
            padding: 80px 20px 60px; 
            max-width: 500px; 
            margin: auto; 
            transition: padding-bottom 0.4s ease;
        }
        .content.input-visible { padding-bottom: 200px; }

        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        .card { 
            background: rgba(17, 17, 17, 0.82);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid var(--border); border-radius: 15px; 
            padding: 15px; margin-bottom: 15px; 
        }

        .gossip-img { 
            width: 100%; 
            max-height: 400px;
            object-fit: cover;
            object-position: center top;
            border-radius: 10px; 
            margin: 10px 0; 
            display: block; 
        }

        .person { 
            color: var(--accent); 
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: 3px; 
            text-transform: uppercase; 
        }

        .post-time {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            margin-bottom: 6px;
        }
        .section-subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .live-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
            vertical-align: middle;
            position: relative;
            top: -2px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 40px 20px;
            font-size: 14px;
        }

        .ranking-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            margin-bottom: 6px;
        }
        .ranking-subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .rank-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; margin-bottom: 8px;
            border-left: 4px solid var(--border);
        }
        .rank-position { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 28px; 
            color: var(--muted); 
            margin-right: 12px; 
            min-width: 30px;
        }
        .rank-count { 
            font-weight: bold; font-size: 16px; 
            color: var(--accent); text-align: right;
        }

        .login-input {
            margin-bottom: 10px; width: 100%;
            background: var(--surface); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 10px;
            outline: none; font-family: 'DM Sans', sans-serif;
        }

        /* =============================================
           LIKE BUTTON
           pointer-events: none během cooldownu zabraňuje
           vícenásobnému kliknutí = žádný glitch.
           ============================================= */
        .like-btn {
            background: rgba(255,45,85,0.12);
            border: 1px solid rgba(255,45,85,0.25);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 5px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .like-btn:active { transform: scale(0.93); }
        .like-btn.liked {
            background: rgba(255,45,85,0.25);
            border-color: var(--accent);
        }
        .like-btn.cooldown { pointer-events: none; opacity: 0.6; }

        .input-toggle-btn {
            position: fixed;
            bottom: 18px; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: rgba(17,17,17,0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: white;
            width: 46px; height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: bottom 0.4s cubic-bezier(0.4,0,0.2,1), background 0.2s;
        }
        .input-toggle-btn.open { bottom: 155px; }
        .input-toggle-btn:hover { background: rgba(40,40,40,0.9); }

        .arrow-svg {
            width: 18px; height: 18px;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .input-toggle-btn.open .arrow-svg { transform: rotate(180deg); }

        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(8,8,8,0.60);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); 
            padding: 15px 15px 22px;
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .input-area.open { transform: translateY(0); }

        .input-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 8px; }

        input[type="text"] { 
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border); 
            color: white; padding: 12px; border-radius: 10px; outline: none;
            font-family: 'DM Sans', sans-serif; width: 100%;
        }
        input[type="text"]::placeholder { color: var(--muted); }

        .post-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 12px; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; 
            cursor: pointer; font-size: 18px; letter-spacing: 1px;
        }

        /* Preview nahrávaného obrázku */
        #imgPreview {
            display: none;
            width: 100%;
            max-height: 160px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        /* Stav odesílání */
        .sending-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: white;
        }
        .sending-overlay.active { display: flex; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<!-- SENDING OVERLAY -->
<div class="sending-overlay" id="sendingOverlay">
    <div class="spinner"></div>
    SENDING...
</div>

<div class="header">
    <div class="logo">Insider</div>
    <button class="nav-toggle" onclick="toggleMenu()">&#9776;</button>
</div>

<div class="menu" id="navMenu">
    <button onclick="showSection('recent')">FEED</button>
    <button onclick="showSection('feed')">GOSSIPS</button>
    <button onclick="showSection('ranking')">RANKING</button>
    <button id="loginBtn" onclick="showSection('login')">LOGIN</button>
    <button class="admin-only" onclick="showSection('admin')">ADMIN</button>
    <button class="admin-only" onclick="logout()" style="color: var(--accent);">LOG OUT</button>
</div>

<div class="content" id="mainContent">

    <!-- FEED (24h) — výchozí stránka při refreshi -->
    <div id="recent" class="section active">
        <div class="section-title"><span class="live-dot"></span>Feed</div>
        <div class="section-subtitle">gossips from the last 24 hours</div>
        <div id="recentFeed">Loading...</div>
    </div>

    <!-- GOSSIPS — všechny schválené -->
    <div id="feed" class="section">
        <div id="gossipFeed">Loading...</div>
    </div>

    <div id="ranking" class="section">
        <div class="ranking-title">The Ranking</div>
        <div class="ranking-subtitle">vymysli si popisek</div>
        <div id="rankingList"></div>
    </div>

    <div id="login" class="section">
        <div class="card">
            <h2 style="font-family:'Bebas Neue'; margin-bottom:15px;">ADMIN LOGIN</h2>
            <input class="login-input" type="text" id="adminUser" placeholder="Username">
            <input class="login-input" type="password" id="adminPass" placeholder="Password">
            <button class="post-btn" onclick="handleLogin()" style="width: 100%;">LOG IN</button>
        </div>
    </div>

    <div id="admin" class="section admin-only">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px;">ADMIN</h2>
        <div id="adminApproveList"></div>
    </div>

</div>

<button class="input-toggle-btn" id="inputToggle" onclick="toggleInputArea()">
    <svg class="arrow-svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
</button>

<div class="input-area" id="inputArea">
    <div class="input-container">
        <img id="imgPreview" alt="preview">
        <input type="text" id="personInput" placeholder="Who was it about?">
        <input type="text" id="gossipInput" placeholder="What happened?">
        <div style="display: flex; gap: 10px;">
            <label style="background:rgba(255,255,255,0.07); padding:12px; border-radius:10px; cursor:pointer; flex:1; text-align:center; border:1px solid var(--border); font-size:14px; color:white;" id="photoLabel">
                📷 FOTO
                <input type="file" id="fileInput" accept="image/*" style="display:none">
            </label>
            <button class="post-btn" id="postBtn" style="flex:2">SEND</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "SEM_VLOZ_SVOJE_API",
    authDomain: "the-list-1efde.firebaseapp.com",
    databaseURL: "https://the-list-1efde-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const gossipRef = ref(db, 'gossip');

const RANKED_PEOPLE = ["Lily", "Mason", "Alison", "Katie", "James"];
const ADMIN_USER = "admin"; 
const ADMIN_PASS = "1234";

// ---- AUTH ----
window.handleLogin = () => {
    const u = document.getElementById('adminUser').value;
    const p = document.getElementById('adminPass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
        localStorage.setItem('isAdmin', 'true');
        location.reload();
    } else { alert("Wrong username or password!"); }
};
window.logout = () => { localStorage.removeItem('isAdmin'); location.reload(); };
const isAdmin = localStorage.getItem('isAdmin') === 'true';
if (isAdmin) document.body.classList.add('is-admin');

// ---- POZADÍ ----
document.body.style.backgroundImage = `url(https://i.imgur.com/BBWTLg6.jpeg)`;

// ---- NAVIGACE ----
window.toggleMenu = () => document.getElementById('navMenu').classList.toggle('active');

window.showSection = (id) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navMenu').classList.remove('active');
    const toggleBtn = document.getElementById('inputToggle');
    if (id === 'feed' || id === 'recent') {
        toggleBtn.style.display = 'flex';
    } else {
        toggleBtn.style.display = 'none';
        closeInputArea();
    }
};

// ---- SPODNÍ LIŠTA ----
let inputOpen = false;
window.toggleInputArea = () => {
    inputOpen = !inputOpen;
    const area = document.getElementById('inputArea');
    const btn  = document.getElementById('inputToggle');
    const content = document.getElementById('mainContent');
    if (inputOpen) {
        area.classList.add('open');
        btn.classList.add('open');
        content.classList.add('input-visible');
    } else { closeInputArea(); }
};
function closeInputArea() {
    inputOpen = false;
    document.getElementById('inputArea').classList.remove('open');
    document.getElementById('inputToggle').classList.remove('open');
    document.getElementById('mainContent').classList.remove('input-visible');
}

// ---- NÁHLED FOTKY ----
// Ukáže miniaturu obrázku hned po výběru souboru
document.getElementById('fileInput').addEventListener('change', function() {
    const file = this.files[0];
    const preview = document.getElementById('imgPreview');
    const label   = document.getElementById('photoLabel');
    if (file) {
        const url = URL.createObjectURL(file);
        preview.src = url;
        preview.style.display = 'block';
        label.childNodes[0].textContent = '✓ FOTO';
    } else {
        preview.style.display = 'none';
        label.childNodes[0].textContent = '📷 FOTO';
    }
});

// ---- KOMPRESE OBRÁZKU ----
// Zmenší fotku na max 800px a kvalitu 0.75
// aby nepřesáhla limit Firebase (~10MB base64)
function compressImage(file, maxWidth = 800, quality = 0.75) {
    return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            URL.revokeObjectURL(url);
            resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = url;
    });
}

// ---- ODESLÁNÍ POSTU ----
document.getElementById('postBtn').onclick = async () => {
    const text   = document.getElementById('gossipInput').value.trim();
    const person = document.getElementById('personInput').value.trim();
    const file   = document.getElementById('fileInput').files[0];
    if (!text || !person) return alert("Write name and gossip!");

    // Zobraz spinner
    document.getElementById('sendingOverlay').classList.add('active');

    let base64 = "";
    if (file) {
        try {
            base64 = await compressImage(file);
        } catch(e) {
            console.error("Image compression failed:", e);
            // Zkus bez komprese jako fallback
            base64 = await new Promise(res => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.readAsDataURL(file);
            });
        }
    }

    try {
        await push(gossipRef, {
            text, person,
            image: base64,
            time: new Date().toLocaleString('cs-CZ'),
            approved: false,
            likes: 0
        });
        document.getElementById('sendingOverlay').classList.remove('active');
        // Reset formuláře bez reload
        document.getElementById('gossipInput').value = '';
        document.getElementById('personInput').value = '';
        document.getElementById('fileInput').value = '';
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('photoLabel').childNodes[0].textContent = '📷 FOTO';
        closeInputArea();
        alert("Submitted for approval ✓");
    } catch(err) {
        document.getElementById('sendingOverlay').classList.remove('active');
        alert("Error sending: " + err.message);
    }
};

// ---- LIKE — bez glitche ----
// Používá runTransaction aby nedošlo ke konfliktu
// a cooldown zabraňuje vícenásobnému kliknutí.
const likeCooldowns = new Set();
window.likePost = (id, btnEl) => {
    if (likeCooldowns.has(id)) return;
    likeCooldowns.add(id);
    btnEl.classList.add('cooldown', 'liked');

    runTransaction(ref(db, 'gossip/' + id + '/likes'), (current) => {
        return (current || 0) + 1;
    }).then(result => {
        // Aktualizuj jen číslo v tlačítku, bez překreslení celého feedu
