<html lang="cs">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* =============================================
           PROMĚNNÉ BAREV

        :root { 
            --bg: #080808; 
            --surface: #111111;

```
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* =============================================
       TĚLO STRÁNKY
       background-size: cover bez blur = ostrá fotka.
       image-rendering zajišťuje ostrý render.
       ============================================= */
    body { 
        font-family: 'DM Sans', sans-serif; 
        background-color: var(--bg);
        background-repeat: no-repeat;
        background-position: center center;
        background-attachment: fixed;
        background-size: cover;
        image-rendering: high-quality;
        -webkit-font-smoothing: antialiased;
        color: var(--text); 
        min-height: 100vh; 
        transition: background-image 0.3s ease;
    }

    /* =============================================
       HORNÍ NAVIGAČNÍ LIŠTA (HEADER)
       Průhlednost snížena — méně blur = ostřejší bg.
       ============================================= */
    .header { 
        position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
        background: rgba(8,8,8,0.75);
        backdrop-filter: blur(8px); 
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--border); 
        padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--accent); }
    .nav-toggle { font-size: 28px; cursor: pointer; color: white; background: none; border: none; }
    
    /* =============================================
       HAMBURGER MENU
       ============================================= */
    .menu { 
        display: none; position: fixed; top: 60px; right: 20px; 
        background: var(--surface); border: 1px solid var(--border); 
        border-radius: 12px; padding: 10px; z-index: 1000; 
        flex-direction: column; gap: 5px; min-width: 180px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .menu.active { display: flex; }
    .menu button { 
        background: none; border: none; color: white; padding: 12px 15px; 
        text-align: left; cursor: pointer; font-family: 'Bebas Neue', sans-serif; 
        font-size: 18px; border-radius: 8px; transition: 0.2s;
    }
    .menu button:hover { background: var(--border); color: var(--accent); }

    /* =============================================
       HLAVNÍ OBLAST OBSAHU
       ============================================= */
    .content { 
        padding: 80px 20px 60px; 
        max-width: 500px; 
        margin: auto; 
        transition: padding-bottom 0.4s ease;
    }
    .content.input-visible { padding-bottom: 200px; }

    .section { display: none; animation: fadeIn 0.4s ease; }
    .section.active { display: block; }

    /* =============================================
       KARTA
       Méně blur na kartách = ostrý obraz na pozadí.
       ============================================= */
    .card { 
        background: rgba(17, 17, 17, 0.82);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid var(--border); border-radius: 15px; 
        padding: 15px; margin-bottom: 15px; 
    }

    /* =============================================
       OBRÁZEK V KARTĚ
       ============================================= */
    .gossip-img { 
        width: 100%; 
        max-height: 400px;
        object-fit: cover;
        object-position: center top;
        border-radius: 10px; 
        margin: 10px 0; 
        display: block; 
    }

    .person { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }

    /* =============================================
       RANKING
       ============================================= */
    .ranking-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 32px;
        margin-bottom: 6px;
    }
    .ranking-subtitle {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 20px;
    }
    .rank-item { 
        display: flex; justify-content: space-between; align-items: center;
        padding: 15px; background: rgba(255,255,255,0.05); 
        border-radius: 10px; margin-bottom: 8px;
        border-left: 4px solid var(--border);
    }
    .rank-position { 
        font-family: 'Bebas Neue', sans-serif; 
        font-size: 28px; 
        color: var(--muted); 
        margin-right: 12px; 
        min-width: 30px;
    }
    .rank-count { 
        font-weight: bold; 
        font-size: 16px; 
        color: var(--accent);
        text-align: right;
    }

    /* =============================================
       PŘIHLAŠOVACÍ FORMULÁŘ (ADMIN)
       ============================================= */
    .login-input {
        margin-bottom: 10px;
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        color: white;
        padding: 12px;
        border-radius: 10px;
        outline: none;
        font-family: 'DM Sans', sans-serif;
    }

    /* =============================================
       ADMIN PANEL
       ============================================= */
    .admin-only { display: none !important; }
    body.is-admin .admin-only { display: block !important; }
    body.is-admin #loginBtn { display: none !important; }

    /* =============================================
       SIPKA
       ============================================= */
    .input-toggle-btn {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        background: rgba(17,17,17,0.75);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        color: white;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: bottom 0.4s cubic-bezier(0.4,0,0.2,1), background 0.2s;
    }
    .input-toggle-btn.open {
        bottom: 155px;
    }
    .input-toggle-btn:hover { background: rgba(40,40,40,0.9); }

    .arrow-svg {
        width: 18px;
        height: 18px;
        transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .input-toggle-btn.open .arrow-svg {
        transform: rotate(180deg);
    }

    /* =============================================
       SPODNÍ LIŠTA
       ============================================= */
    .input-area { 
        position: fixed; bottom: 0; left: 0; right: 0; 
        background: rgba(8,8,8,0.60);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--border); 
        padding: 15px 15px 22px;
        z-index: 101;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .input-area.open {
        transform: translateY(0);
    }

    .input-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 8px; }

    input[type="text"] { 
        background: rgba(255,255,255,0.07);
        border: 1px solid var(--border); 
        color: white; padding: 12px; border-radius: 10px; outline: none;
        font-family: 'DM Sans', sans-serif;
        width: 100%;
    }
    input[type="text"]::placeholder { color: var(--muted); }

    /* =============================================
       TLAČÍTKO POSLAT
       ============================================= */
    .post-btn { 
        background: var(--accent); color: white; border: none; 
        padding: 12px; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; 
        cursor: pointer; font-size: 18px; letter-spacing: 1px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>

    <div id="gossipFeed">Loading...</div>
</div>

<div id="ranking" class="section">
    <div class="ranking-title">The Ranking</div>
    <div class="ranking-subtitle">vymysli si popisek</div>
    <div id="rankingList"></div>

</div>

<!-- SIPKA -->

<button class="input-toggle-btn" id="inputToggle" onclick="toggleInputArea()">
    <svg class="arrow-svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
</button>

<!-- SPODNÍ LIŠTA -->

<div class="input-area" id="inputArea">
    <div class="input-container">
        <input type="text" id="personInput" placeholder="Who was it about?">
        <input type="text" id="gossipInput" placeholder="What happened?">
        <div style="display: flex; gap: 10px;">
            <label style="background:rgba(255,255,255,0.07); padding:12px; border-radius:10px; cursor:pointer; flex:1; text-align:center; border:1px solid var(--border); font-size:14px;" id="photoLabel">
                FOTO
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="document.getElementById('photoLabel').innerText='FOTO OK'">
            </label>
            <button class="post-btn" id="postBtn" style="flex:2">SEND</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// =============================================
// KONFIGURACE FIREBASE
// =============================================
const firebaseConfig = {
    apiKey: "SEM_VLOZ_SVOJE_API",
    authDomain: "the-list-1efde.firebaseapp.com",
    databaseURL: "https://the-list-1efde-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const gossipRef = ref(db, 'gossip');

// =============================================
// PEVNÝ SEZNAM LIDÍ V RANKINGU
// =============================================
const RANKED_PEOPLE = ["Lily", "Mason", "Alison", "Katie", "James"];

// =============================================
// ADMIN PŘIHLAŠOVÁNÍ
// =============================================
const ADMIN_USER = "admin"; 
const ADMIN_PASS = "1234";

window.handleLogin = () => {
    const u = document.getElementById('adminUser').value;
    const p = document.getElementById('adminPass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
        localStorage.setItem('isAdmin', 'true');
        location.reload();
    } else { alert("Wrong username or password!"); }
};
window.logout = () => { localStorage.removeItem('isAdmin'); location.reload(); };

const isAdmin = localStorage.getItem('isAdmin') === 'true';
if (isAdmin) document.body.classList.add('is-admin');

// =============================================
// POZADÍ — ostrá fotka bez blur artefaktů.
//
// Pozadí se nastaví přes CSS background-image.
// Klíč: background-size: cover bez dalších filtrů
// na body samotném zajistí plnou ostrost.
// Rozmazání způsobovaly backdrop-filter na kartách
// (sníženy) a backdrop-filter na headeru (snížen).
// =============================================
const globalDefaultBg = "https://i.ibb.co/mYrQ8rX/image.png";
document.body.style.backgroundImage = `url(${globalDefaultBg})`;

// =============================================
// NAVIGACE
// =============================================
window.toggleMenu = () => document.getElementById('navMenu').classList.toggle('active');

window.showSection = (id) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navMenu').classList.remove('active');
    const toggleBtn = document.getElementById('inputToggle');
    if (id === 'feed') {
        toggleBtn.style.display = 'flex';
    } else {
        toggleBtn.style.display = 'none';
        closeInputArea();
    }
};

// =============================================
// SIPKA — OTEVRIT / ZAVRIT SPODNI LISTU
// =============================================
let inputOpen = false;

window.toggleInputArea = () => {
    inputOpen = !inputOpen;
    const area    = document.getElementById('inputArea');
    const btn     = document.getElementById('inputToggle');
    const content = document.getElementById('mainContent');
    if (inputOpen) {
        area.classList.add('open');
        btn.classList.add('open');
        content.classList.add('input-visible');
    } else {
        closeInputArea();
    }
};

function closeInputArea() {
    inputOpen = false;
    document.getElementById('inputArea').classList.remove('open');
    document.getElementById('inputToggle').classList.remove('open');
    document.getElementById('mainContent').classList.remove('input-visible');
}

// =============================================
// ODESLÁNÍ NOVÉHO DRBU
// =============================================
document.getElementById('postBtn').onclick = async () => {
    const text   = document.getElementById('gossipInput').value.trim();
    const person = document.getElementById('personInput').value.trim();
    const file   = document.getElementById('fileInput').files[0];
    if (!text || !person) return alert("Write name and gossip!");

    let base64 = "";
    if (file) {
        base64 = await new Promise(res => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(file);
        });
    }

    await push(gossipRef, {
        text, person, image: base64,
        time: new Date().toLocaleString('cs-CZ'),
        approved: false, likes: 0
    });
    alert("The post has been submitted for approval.");
    location.reload();
};

// =============================================
// LIKE, SCHVÁLENÍ, SMAZÁNÍ
// =============================================
window.likePost    = (id, cur) => update(ref(db, 'gossip/' + id), { likes: (cur || 0) + 1 });
window.approvePost = (id)      => update(ref(db, 'gossip/' + id), { approved: true });
window.deletePost  = (id)      => confirm("Smazat?") && remove(ref(db, 'gossip/' + id));

// =============================================
// NAČÍTÁNÍ DAT Z FIREBASE & VYKRESLENÍ
// =============================================
onValue(gossipRef, (snapshot) => {
    const data = snapshot.val() || {};
    const feed       = document.getElementById('gossipFeed');
    const rankingDiv = document.getElementById('rankingList');
    const adminDiv   = document.getElementById('adminApproveList');

    feed.innerHTML     = "";
    adminDiv.innerHTML = "<h3 style='margin:20px 0 10px; font-family:Bebas Neue; color:var(--accent)'>Waiting for approval.:</h3>";

    // =============================================
    // POČÍTÁNÍ ZMÍNEK PRO RANKING
    // =============================================
    const mentionCount = {};
    RANKED_PEOPLE.forEach(n => { mentionCount[n.toLowerCase()] = 0; });

    Object.entries(data).reverse().forEach(([id, item]) => {
        const personText = (item.person || "").toLowerCase();
        const likes      = item.likes || 0;

        if (item.approved) {

            RANKED_PEOPLE.forEach(name => {
                if (personText.includes(name.toLowerCase())) {
                    mentionCount[name.toLowerCase()]++;
                }
            });

            // --- FEED ---
            feed.innerHTML += `
                <div class="card">
                    <div class="person">${item.person}</div>
                    <div style="line-height:1.5">${item.text}</div>
                    ${item.image ? `<img src="${item.image}" class="gossip-img" loading="lazy">` : ""}
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                        <button class="post-btn" style="padding:5px 15px; font-size:14px;" onclick="likePost('${id}', ${likes})">
                            ${likes} likes
                        </button>
                        ${isAdmin ? `<button onclick="deletePost('${id}')" style="background:none; border:none; color:#555; cursor:pointer; font-size:14px; font-family:'Bebas Neue'">DELETE</button>` : ""}
                    </div>
                </div>`;

        } else if (isAdmin) {
            // --- ADMIN: KE SCHVÁLENÍ ---
            adminDiv.innerHTML += `
                <div class="card" style="border-color: var(--accent)">
                    <b>${item.person}</b>: ${item.text}
                    ${item.image ? `<img src="${item.image}" class="gossip-img">` : ""}
                    <div style="margin-top:10px; display:flex; gap:10px;">
                        <button class="post-btn" style="flex:1; background:#28a745; font-size:14px" onclick="approvePost('${id}')">APPROVE</button>
                        <button class="post-btn" style="flex:1; background:#dc3545; font-size:14px" onclick="deletePost('${id}')">DELETE</button>
                    </div>
                </div>`;
        }
    });

    // =============================================
    // VYKRESLENÍ RANKINGU
    // =============================================
    const sorted = RANKED_PEOPLE
        .map(name => [name, mentionCount[name.toLowerCase()] || 0])
        .sort((a, b) => b[1] - a[1]);

    rankingDiv.innerHTML = sorted.map(([name, count], i) => {
        const rankClass = i < 3 ? `rank-${i + 1}` : '';
        const countText = count === 1 ? '1 zminka' : `${count} zminek`;
        return `
        <div class="rank-item ${rankClass}">
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="rank-position">${i + 1}</span>
                <div style="font-weight:bold;">${name}</div>
            </div>
            <span class="rank-count">${countText}</span>
        </div>`;
    }).join('');
});
</script>

</body>
