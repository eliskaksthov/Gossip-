    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
        font-family: 'DM Sans', sans-serif; 
        background-color: var(--bg);
        color: var(--text); 
        min-height: 100vh;
        background-image: url('https://i.imgur.com/BBWTLg6.jpeg');
        background-attachment: fixed;
        background-size: cover;
    }

    .header { 
        position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
        background: rgba(8,8,8,0.75);
        backdrop-filter: blur(12px); 
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border); 
        padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
    }

    .logo { font-size: 28px; color: var(--accent); font-weight: bold; }
    .nav-toggle { font-size: 28px; cursor: pointer; color: white; background: none; border: none; }
    
    .menu { 
        display: none; position: fixed; top: 60px; right: 20px; 
        background: var(--surface); border: 1px solid var(--border); 
        border-radius: 12px; padding: 10px; z-index: 1000; 
        flex-direction: column; gap: 5px; min-width: 180px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .menu.active { display: flex; }
    .menu button { 
        background: none; border: none; color: white; padding: 12px 15px; 
        text-align: left; cursor: pointer; font-family: 'Bebas Neue', sans-serif; 
        font-size: 18px; border-radius: 8px; transition: 0.2s;
    }
    .menu button:hover { background: var(--border); color: var(--accent); }

    .admin-only { display: none !important; }
    body.is-admin .admin-only { display: block !important; }
    body.is-admin #loginBtn { display: none !important; }

    .content { padding: 80px 20px 80px; max-width: 500px; margin: auto; }

    .section { display: none; animation: fadeIn 0.4s ease; }
    .section.active { display: block; }

    .card { 
        background: rgba(17, 17, 17, 0.85);
        backdrop-filter: blur(6px);
        border: 1px solid var(--border); border-radius: 15px; 
        padding: 15px; margin-bottom: 15px;
    }

    .gossip-img { width: 100%; border-radius: 10px; margin: 10px 0; display: block; }
    .person { color: var(--accent); font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
    .post-time { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

    /* Like tlačítko */
    .like-btn {
        background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border);
        padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: 0.2s;
        font-family: 'Bebas Neue', sans-serif; font-size: 14px;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
    }
    .like-btn.liked { background: var(--accent); border-color: var(--accent); }
    .like-btn:disabled { opacity: 0.5; pointer-events: none; }

    /* Feed nadpis */
    .feed-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 32px;
        margin-bottom: 6px;
    }
    .feed-subtitle {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 20px;
    }
    .live-dot {
        display: inline-block;
        width: 7px; height: 7px;
        background: var(--accent);
        border-radius: 50%;
        margin-right: 6px;
        animation: pulse 1.5s infinite;
        vertical-align: middle;
        position: relative; top: -2px;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.85); }
    }

    .empty-state {
        text-align: center; color: var(--muted);
        padding: 40px 20px; font-size: 14px;
    }

    /* Ranking */
    .rank-item {
        background: rgba(255,255,255,0.05);
        border-radius: 10px; margin-bottom: 8px;
        padding: 15px; display: flex; justify-content: space-between; align-items: center;
        border-left: 4px solid var(--border);
    }
    .rank-num {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 28px; color: var(--muted);
        margin-right: 12px; min-width: 30px;
    }

    /* Input lišta */
    .input-area { 
        position: fixed; bottom: 0; left: 0; right: 0; 
        background: rgba(8,8,8,0.9); backdrop-filter: blur(20px);
        border-top: 1px solid var(--border); padding: 15px 15px 22px;
        transform: translateY(100%); transition: 0.4s cubic-bezier(0.4,0,0.2,1); z-index: 101;
    }
    .input-area.open { transform: translateY(0); }
    .input-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 8px; }

    .input-toggle-btn {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 46px; height: 46px; border-radius: 50%;
        background: rgba(17,17,17,0.75); backdrop-filter: blur(10px);
        border: 1px solid var(--border); color: white;
        font-size: 22px; cursor: pointer; z-index: 200;
        display: flex; align-items: center; justify-content: center;
        transition: bottom 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .input-toggle-btn.open { bottom: 175px; }

    input[type="text"] { 
        width: 100%; background: #222; border: 1px solid #333; color: white;
        padding: 12px; border-radius: 10px; outline: none;
        font-family: 'DM Sans', sans-serif;
    }
    input[type="text"]::placeholder { color: var(--muted); }

    .post-btn { 
        background: var(--accent); color: white; border: none; 
        padding: 12px; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; 
        cursor: pointer; font-size: 18px; letter-spacing: 1px;
    }

    /* Foto label */
    .foto-label {
        background: rgba(255,255,255,0.07); padding: 12px; border-radius: 10px;
        cursor: pointer; text-align: center; border: 1px solid var(--border);
        font-size: 14px; color: white; flex: 1;
    }

    /* Preview obrázku */
    #imgPreview {
        display: none; width: 100%; max-height: 160px;
        object-fit: cover; border-radius: 10px;
        border: 1px solid var(--border);
    }

    /* Spinner overlay */
    .sending-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.6); z-index: 9999;
        align-items: center; justify-content: center;
        flex-direction: column; gap: 12px;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px; letter-spacing: 2px; color: white;
    }
    .sending-overlay.active { display: flex; }
    .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: var(--accent);
        border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

<!-- Formulář pro nový gossip -->

<div class="input-area" id="inputArea">
    <div class="input-container">
        <img id="imgPreview" alt="preview">
        <input type="text" id="personInput" placeholder="Who was it about?">
        <input type="text" id="gossipInput" placeholder="What happened?">
        <div style="display:flex; gap:10px;">
            <label class="foto-label" id="photoLabel">
                📷 FOTO
                <input type="file" id="fileInput" accept="image/*" style="display:none">
            </label>
            <button class="post-btn" onclick="submitGossip()" style="flex:2">SEND</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://rfpsagdsxqstbvtdcsmy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QAlABDjRq-eDetfcgWC6xA_vQz21wrG';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASS = "1234";
const RANKED_PEOPLE = ["Lily", "Mason", "Alison", "Katie", "James"];

// ---- AUTH ----
const isAdmin = localStorage.getItem('isInsiderAdmin') === 'true';
if (isAdmin) document.body.classList.add('is-admin');

function handleLogin() {
    if (document.getElementById('adminPass').value === ADMIN_PASS) {
        localStorage.setItem('isInsiderAdmin', 'true');
        location.reload();
    } else { alert("Wrong password"); }
}
function logout() { localStorage.removeItem('isInsiderAdmin'); location.reload(); }

// ---- NAVIGACE ----
function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navMenu').classList.remove('active');
    // Sipka jen na feed stránkách
    const toggleBtn = document.getElementById('inputToggle');
    toggleBtn.style.display = (id === 'feed' || id === 'recent') ? 'flex' : 'none';
    if (id !== 'feed' && id !== 'recent') closeInputArea();
}

// ---- SPODNÍ LIŠTA ----
let inputOpen = false;
function toggleInputArea() {
    inputOpen = !inputOpen;
    document.getElementById('inputArea').classList.toggle('open', inputOpen);
    document.getElementById('inputToggle').classList.toggle('open', inputOpen);
    document.getElementById('inputToggle').textContent = inputOpen ? '×' : '+';
}
function closeInputArea() {
    inputOpen = false;
    document.getElementById('inputArea').classList.remove('open');
    document.getElementById('inputToggle').classList.remove('open');
    document.getElementById('inputToggle').textContent = '+';
}

// ---- NÁHLED FOTKY ----
document.getElementById('fileInput').addEventListener('change', function() {
    const file = this.files[0];
    const preview = document.getElementById('imgPreview');
    const label   = document.getElementById('photoLabel');
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        label.childNodes[0].textContent = '✓ FOTO';
    } else {
        preview.style.display = 'none';
        label.childNodes[0].textContent = '📷 FOTO';
    }
});

// ---- KOMPRESE OBRÁZKU ----
function compressImage(file, maxWidth = 900, quality = 0.78) {
    return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            URL.revokeObjectURL(url);
            // Vrátí Blob pro přímý upload do Supabase Storage
            canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
        };
        img.src = url;
    });
}

// ---- ODESLÁNÍ ----
async function submitGossip() {
    const person  = document.getElementById('personInput').value.trim();
    const content = document.getElementById('gossipInput').value.trim();
    const file    = document.getElementById('fileInput').files[0];
    if (!person || !content) return alert("Fill in both fields!");

    document.getElementById('sendingOverlay').classList.add('active');

    let imageUrl = null;
    if (file) {
        try {
            const blob = await compressImage(file);
            const fileName = `${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
            const { data, error } = await _supabase.storage
                .from('gossip-images')
                .upload(fileName, blob, { contentType: 'image/jpeg' });
            if (data && !error) {
                imageUrl = `${SUPABASE_URL}/storage/v1/object/public/gossip-images/${fileName}`;
            }
        } catch(e) { console.error('Image upload error:', e); }
    }

    const { error } = await _supabase.from('gossips').insert([{
        person, content, image_url: imageUrl,
        approved: false, likes: 0
    }]);

    document.getElementById('sendingOverlay').classList.remove('active');

    if (!error) {
        document.getElementById('personInput').value = '';
        document.getElementById('gossipInput').value = '';
        document.getElementById('fileInput').value = '';
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('photoLabel').childNodes[0].textContent = '📷 FOTO';
        closeInputArea();
        alert("Submitted for approval ✓");
    } else {
        alert("Error: " + error.message);
    }
}

// ---- LIKE ----
async function likePost(id, currentLikes, btnEl) {
    const key = 'liked_' + id;
    if (localStorage.getItem(key)) return;
    localStorage.setItem(key, 'true');
    btnEl.disabled = true;
    btnEl.classList.add('liked');

    const { error } = await _supabase
        .from('gossips')
        .update({ likes: currentLikes + 1 })
        .eq('id', id);

    if (!error) {
        // Aktualizuj jen číslo, bez překreslení
        btnEl.textContent = (currentLikes + 1) + ' LIKES';
        btnEl.classList.add('liked');
    } else {
        localStorage.removeItem(key);
        btnEl.disabled = false;
        btnEl.classList.remove('liked');
    }
}

// ---- SCHVÁLENÍ / SMAZÁNÍ (jen admin) ----
async function approvePost(id) {
    await _supabase.from('gossips').update({ approved: true }).eq('id', id);
    loadData();
}
async function deletePost(id) {
    if (confirm("Delete this post?")) {
        await _supabase.from('gossips').delete().eq('id', id);
        loadData();
    }
}

// ---- SESTAVENÍ KARTY ----
// approve tlačítko se vůbec nevytvoří — je jen v adminu
function buildCard(item, showDelete) {
    const liked = localStorage.getItem('liked_' + item.id);
    return `
        <div class="card" data-id="${item.id}">
            <div class="person">${item.person}</div>
            <div class="post-time">${new Date(item.created_at).toLocaleString('cs-CZ')}</div>
            <div style="line-height:1.5; margin-bottom:12px">${item.content}</div>
            ${item.image_url ? `<img src="${item.image_url}" class="gossip-img" loading="lazy">` : ''}
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                <button class="like-btn ${liked ? 'liked' : ''}" ${liked ? 'disabled' : ''}
                    onclick="likePost('${item.id}', ${item.likes}, this)">
                    ${item.likes} LIKES
                </button>
                ${showDelete ? `<button onclick="deletePost('${item.id}')" style="background:none;border:none;color:#555;cursor:pointer;font-size:14px;font-family:'Bebas Neue'">DELETE</button>` : ''}
            </div>
        </div>`;
}

// ---- NAČÍTÁNÍ DAT ----
async function loadData() {
    const { data: gossips, error } = await _supabase
        .from('gossips')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) { console.error(error); return; }

    const feedEl   = document.getElementById('gossipFeed');
    const recentEl = document.getElementById('recentFeed');
    const adminEl  = document.getElementById('adminApproveList');
    const rankEl   = document.getElementById('rankingList');

    feedEl.innerHTML   = '';
    recentEl.innerHTML = '';
    adminEl.innerHTML  = '<div class="feed-subtitle" style="margin-bottom:15px">Waiting for approval:</div>';

    const stats = {};
    RANKED_PEOPLE.forEach(p => stats[p.toLowerCase()] = 0);

    const now   = Date.now();
    const ms24h = 24 * 60 * 60 * 1000;
    let recentCount = 0;

    gossips.forEach(item => {
        if (item.approved) {
            // Ranking statistiky
            const pLower = item.person.toLowerCase();
            RANKED_PEOPLE.forEach(name => {
                if (pLower.includes(name.toLowerCase())) stats[name.toLowerCase()]++;
            });

            // GOSSIPS — všechny schválené, DELETE jen admin
            feedEl.innerHTML += buildCard(item, isAdmin);

            // FEED — posledních 24h
            if ((now - new Date(item.created_at).getTime()) < ms24h) {
                recentEl.innerHTML += buildCard(item, isAdmin);
                recentCount++;
            }

        } else if (isAdmin) {
            // =============================================
            // ADMIN — jedině tady jsou APPROVE / DELETE tlačítka
            // buildCard se zde nepoužívá záměrně, aby
            // APPROVE tlačítko nikdy nebylo na feedu.
            // =============================================
            adminEl.innerHTML += `
                <div class="card" style="border-color: var(--accent)">
                    <div class="person">${item.person}</div>
                    <div class="post-time">${new Date(item.created_at).toLocaleString('cs-CZ')}</div>
                    <div style="line-height:1.5; margin-bottom:12px">${item.content}</div>
                    ${item.image_url ? `<img src="${item.image_url}" class="gossip-img">` : ''}
                    <div style="display:flex; gap:10px; margin-top:8px;">
                        <button class="post-btn" style="flex:1; background:#28a745; font-size:14px" onclick="approvePost('${item.id}')">APPROVE</button>
                        <button class="post-btn" style="flex:1; background:#dc3545; font-size:14px" onclick="deletePost('${item.id}')">DELETE</button>
                    </div>
                </div>`;
        }
    });

    if (recentCount === 0) recentEl.innerHTML = `<div class="empty-state">No gossips in the last 24 hours 🤫</div>`;
    if (feedEl.innerHTML === '') feedEl.innerHTML = `<div class="empty-state">No gossips yet</div>`;

    // Ranking
    const sorted = [...RANKED_PEOPLE].sort((a,b) => stats[b.toLowerCase()] - stats[a.toLowerCase()]);
    rankEl.innerHTML = sorted.map((name, i) => `
        <div class="rank-item">
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="rank-num">${i+1}</span>
                <span style="font-weight:bold">${name}</span>
            </div>
            <span style="color:var(--accent); font-weight:bold">${stats[name.toLowerCase()]} ×</span>
        </div>`).join('');
}

// ---- START ----
loadData();
setInterval(loadData, 30000);
</script>
